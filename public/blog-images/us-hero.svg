<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title">
  <title id="title">US Passport Photo Requirements 2026</title>
  <defs>
    <linearGradient id="bgUs" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgUs)"/>
  <!-- US-style red/white stripes accent -->
  <g opacity="0.12">
    <rect x="0" y="0" width="1200" height="14" fill="#dc2626"/>
    <rect x="0" y="28" width="1200" height="14" fill="#dc2626"/>
    <rect x="0" y="56" width="1200" height="14" fill="#dc2626"/>
    <rect x="0" y="84" width="1200" height="14" fill="#dc2626"/>
  </g>
  <!-- Photo example with measurement overlay -->
  <g transform="translate(140,150)">
    <rect width="280" height="280" fill="#ffffff" stroke="#1e40af" stroke-width="4"/>
    <!-- person silhouette -->
    <g transform="translate(50,30)">
      <circle cx="90" cy="80" r="60" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
      <path d="M 20 160 Q 90 130 160 160 L 160 220 L 20 220 Z" fill="#1e40af"/>
      <circle cx="78" cy="75" r="3" fill="#1e293b"/>
      <circle cx="102" cy="75" r="3" fill="#1e293b"/>
      <line x1="78" y1="92" x2="102" y2="92" stroke="#1e293b" stroke-width="1.5"/>
    </g>
    <!-- Vertical dimension -->
    <g stroke="#dc2626" stroke-width="2">
      <line x1="-30" y1="0" x2="-30" y2="280"/>
      <line x1="-35" y1="0" x2="-25" y2="0"/>
      <line x1="-35" y1="280" x2="-25" y2="280"/>
    </g>
    <text x="-50" y="145" text-anchor="middle" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="14" font-weight="700" transform="rotate(-90, -50, 145)">51 mm</text>
    <!-- Horizontal dimension -->
    <g stroke="#dc2626" stroke-width="2">
      <line x1="0" y1="305" x2="280" y2="305"/>
      <line x1="0" y1="300" x2="0" y2="310"/>
      <line x1="280" y1="300" x2="280" y2="310"/>
    </g>
    <text x="140" y="325" text-anchor="middle" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="14" font-weight="700">51 mm (2 in)</text>
  </g>
  <!-- Specs panel on right - increased gap between label and value -->
  <g transform="translate(560,150)" font-family="-apple-system,Inter,sans-serif">
    <text x="0" y="0" fill="#0f172a" font-size="42" font-weight="800">US Specs</text>
    <g transform="translate(0,40)">
      <text x="0" y="20" font-size="17" fill="#475569">Size</text>
      <text x="540" y="20" font-size="17" fill="#0f172a" font-weight="600" text-anchor="end">2 × 2 in (51 × 51 mm)</text>
      <line x1="0" y1="32" x2="540" y2="32" stroke="#e2e8f0" stroke-width="1"/>
      <text x="0" y="62" font-size="17" fill="#475569">Face height</text>
      <text x="540" y="62" font-size="17" fill="#0f172a" font-weight="600" text-anchor="end">50–69% of frame</text>
      <line x1="0" y1="74" x2="540" y2="74" stroke="#e2e8f0" stroke-width="1"/>
      <text x="0" y="104" font-size="17" fill="#475569">Background</text>
      <text x="540" y="104" font-size="17" fill="#0f172a" font-weight="600" text-anchor="end">Pure white</text>
      <line x1="0" y1="116" x2="540" y2="116" stroke="#e2e8f0" stroke-width="1"/>
      <text x="0" y="146" font-size="17" fill="#475569">Expression</text>
      <text x="540" y="146" font-size="17" fill="#0f172a" font-weight="600" text-anchor="end">Neutral, mouth closed</text>
      <line x1="0" y1="158" x2="540" y2="158" stroke="#e2e8f0" stroke-width="1"/>
      <text x="0" y="188" font-size="17" fill="#475569">Glasses</text>
      <text x="540" y="188" font-size="17" fill="#dc2626" font-weight="700" text-anchor="end">NOT allowed</text>
      <line x1="0" y1="200" x2="540" y2="200" stroke="#e2e8f0" stroke-width="1"/>
      <text x="0" y="230" font-size="17" fill="#475569">Resolution</text>
      <text x="540" y="230" font-size="17" fill="#0f172a" font-weight="600" text-anchor="end">600–1200 px square</text>
    </g>
  </g>
  <!-- Title - moved further down to avoid the dimension label -->
  <g transform="translate(60,580)">
    <text x="0" y="0" fill="#0f172a" font-family="-apple-system,Inter,sans-serif" font-size="38" font-weight="800">US Passport Photo Requirements 2026</text>
    <text x="0" y="32" fill="#64748b" font-family="-apple-system,Inter,sans-serif" font-size="18" font-weight="500">Every official rule from the State Department, in plain English</text>
  </g>
</svg>
