<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title">
  <title id="title">Why passport photos get rejected — top 10 reasons</title>
  <defs>
    <linearGradient id="bgRej" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset="1" stop-color="#fee2e2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgRej)"/>
  <!-- Big rejected stamp -->
  <g transform="translate(820,140) rotate(-12)">
    <rect width="280" height="90" rx="6" fill="none" stroke="#dc2626" stroke-width="6"/>
    <text x="140" y="62" text-anchor="middle" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="44" font-weight="800" letter-spacing="3">REJECTED</text>
  </g>
  <!-- Sample passport photo with red X overlay -->
  <g transform="translate(140,140)">
    <rect width="280" height="280" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <!-- silhouette -->
    <circle cx="140" cy="120" r="60" fill="#cbd5e1"/>
    <path d="M 60 230 Q 140 175 220 230 L 220 280 L 60 280 Z" fill="#94a3b8"/>
    <!-- shadow on background (the issue) -->
    <ellipse cx="190" cy="160" rx="60" ry="100" fill="#94a3b8" opacity="0.25"/>
    <!-- Red X -->
    <line x1="40" y1="40" x2="240" y2="240" stroke="#dc2626" stroke-width="6" opacity="0.6"/>
    <line x1="240" y1="40" x2="40" y2="240" stroke="#dc2626" stroke-width="6" opacity="0.6"/>
  </g>
  <!-- Issue arrows pointing to common problems -->
  <g transform="translate(440,180)">
    <text x="0" y="0" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="18" font-weight="700">→ Shadow on background</text>
    <text x="0" y="40" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="18" font-weight="700">→ Glasses on (banned in US)</text>
    <text x="0" y="80" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="18" font-weight="700">→ Slight smile</text>
    <text x="0" y="120" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="18" font-weight="700">→ Wrong dimensions</text>
    <text x="0" y="160" fill="#dc2626" font-family="-apple-system,Inter,sans-serif" font-size="18" font-weight="700">→ Background not pure white</text>
    <text x="0" y="200" fill="#64748b" font-family="-apple-system,Inter,sans-serif" font-size="16" font-style="italic">…and 5 more inside</text>
  </g>
  <!-- Title -->
  <g transform="translate(60,500)">
    <text x="0" y="0" fill="#0f172a" font-family="-apple-system,Inter,sans-serif" font-size="46" font-weight="800">Why Passport Photos Get Rejected</text>
    <text x="0" y="38" fill="#64748b" font-family="-apple-system,Inter,sans-serif" font-size="20" font-weight="500">Top 10 reasons — each one fixable in 2 minutes</text>
  </g>
</svg>
